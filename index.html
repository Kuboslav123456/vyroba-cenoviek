<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Výroba cenoviek v1.0</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <span class="hdr-title" id="hdrTitleText">Výroba cenoviek</span>
    <span class="hdr-version" id="hdrVersion">v1.0</span>
  </div>
  <div class="hdr-right">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="sk">SK</button>
      <button class="lang-btn" data-lang="cz">CZ</button>
    </div>
    <span class="status-indicator" id="statusIndicator"></span>
    <button class="btn btn-primary" id="btnPdf" data-i18n="btnPdf">Vygenerovať PDF</button>
  </div>
</header>

<main class="main">

  <!-- LEFT: list of products -->
  <aside class="left">
    <div class="left-head">
      <span class="section-title" data-i18n="products">Produkty</span>
      <span class="count" id="countLabel">(0)</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Hľadať produkt...">
    </div>

    <select id="categoryFilter" class="cat-filter">
      <option value="__all__" data-i18n="allCategories">Všetky kategórie</option>
    </select>

    <div class="list" id="productList"></div>

    <button class="btn btn-add" id="btnAdd" data-i18n="addProduct">+ Nový produkt</button>
  </aside>

  <!-- RIGHT: edit form -->
  <section class="right">
    <div class="form-card" id="formCard">
      <div class="form-empty" id="formEmpty">
        <div class="empty-icon">📋</div>
        <div class="empty-text" data-i18n="emptyHintHtml" data-i18n-html>Vyber produkt zo zoznamu vľavo<br>alebo klikni na <strong>+ Nový produkt</strong></div>
      </div>

      <div class="form-content" id="formContent" hidden>
        <div class="form-header">
          <h2 id="formProductName">Produkt</h2>
          <div class="form-actions">
            <button class="btn btn-ghost" id="btnDuplicate" data-i18n="btnDuplicate">Duplikovať</button>
            <button class="btn btn-danger" id="btnDelete" data-i18n="btnDelete">Vymazať</button>
          </div>
        </div>

        <div class="form-grid">
          <label class="field">
            <span class="lbl" data-i18n="fldCategory">Kategória</span>
            <select id="fldCategory"></select>
          </label>

          <label class="field">
            <span class="lbl" data-i18n="fldName">Názov produktu</span>
            <input type="text" id="fldName">
          </label>

          <label class="field">
            <span class="lbl" data-i18n="fldSubtitle">Popis / príchuť</span>
            <input type="text" id="fldSubtitle">
          </label>

          <label class="field">
            <span class="lbl" id="lblWeight" data-i18n="fldWeight">Hmotnosť</span>
            <input type="text" id="fldWeight">
          </label>

          <label class="field lang-sk-only">
            <span class="lbl" data-i18n="fldPriceBa">Cena BA</span>
            <input type="text" id="fldPriceBa">
          </label>

          <label class="field lang-sk-only">
            <span class="lbl" data-i18n="fldPriceMimo">Cena mimo BA</span>
            <input type="text" id="fldPriceMimo">
          </label>

          <label class="field field-full lang-cz-only">
            <span class="lbl" data-i18n="fldPriceCz">Cena</span>
            <input type="text" id="fldPriceCz" placeholder="napr. 89 Kč">
          </label>

          <label class="field field-full">
            <span class="lbl" data-i18n="fldIngredients">Zloženie (ingrediencie)</span>
            <textarea id="fldIngredients" rows="4"></textarea>
          </label>

          <label class="field">
            <span class="lbl" data-i18n="fldAlergeny">Alergény</span>
            <input type="text" id="fldAlergeny">
          </label>

          <label class="field">
            <span class="lbl" data-i18n="fldTrvanlivost">Trvanlivosť</span>
            <input type="text" id="fldTrvanlivost">
          </label>

          <label class="field field-full">
            <span class="lbl" data-i18n="fldVyrobca">Výrobca</span>
            <input type="text" id="fldVyrobca">
          </label>
        </div>

        <div class="form-footer">
          <span class="validation-msg" id="validationMsg"></span>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- Footer with import/export -->
<footer class="footer">
  <button class="btn btn-ghost btn-sm" id="btnExport" data-i18n="btnExport">Exportovať dáta (JSON)</button>
  <button class="btn btn-ghost btn-sm" id="btnImport" data-i18n="btnImport">Importovať dáta (JSON)</button>
  <input type="file" id="fileInput" accept=".json" hidden>
  <span class="footer-info" id="footerInfo"></span>
</footer>

<!-- Multi-select PDF dialog -->
<div class="modal" id="pdfModal" hidden>
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 data-i18n="modalTitle">Vyber produkty pre PDF</h3>
      <button class="btn-close" id="btnModalClose">×</button>
    </div>
    <div class="modal-actions-top">
      <button class="btn btn-ghost btn-sm" id="btnSelectAll" data-i18n="btnSelectAll">Vybrať všetky</button>
      <button class="btn btn-ghost btn-sm" id="btnSelectNone" data-i18n="btnSelectNone">Žiadne</button>
      <span class="price-sep lang-sk-only">|</span>
      <span class="price-label lang-sk-only" data-i18n="priceLabel">Cena:</span>
      <div class="price-toggle lang-sk-only">
        <button class="price-btn active" data-tier="ba">BA</button>
        <button class="price-btn" data-tier="mimo">Mimo BA</button>
      </div>
      <span class="modal-count" id="modalCount">0 vybraných</span>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btnModalCancel" data-i18n="btnModalCancel">Zrušiť</button>
      <button class="btn btn-ghost" id="btnModalPrint" data-i18n="btnModalPrint">Tlačiť priamo</button>
      <button class="btn btn-primary" id="btnModalGenerate" data-i18n="btnModalGenerate">Stiahnuť PDF</button>
    </div>
  </div>
</div>

<!-- Hidden canvas for PDF rendering -->
<canvas id="pdfCanvas" width="2481" height="3508" hidden></canvas>

<!-- Hidden image preload -->
<img id="paperBg" src="paper_bg.jpeg" hidden alt="">

<script src="pdf.js"></script>
<script src="app.js"></script>
